name: Simulación CI/CD - InvenTree

on:
  push:
    branches: [ "develop" ]

jobs:
  # FASE 1: INTEGRACIÓN CONTINUA (Validación y Calidad de Código)
  integracion-continua:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código Fuente
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-cache-dependency-path: 'src/backend/requirements.txt'
          python-version: '3.11'

      # VALIDACIÓN: Comprobación de indentación y estilo (Linter)
      - name: Validar Indentación y Estilo de Código (Flake8)
        run: |
          pip install flake8
          flake8 src/backend/ --count --select=E9,F63,F7,F82 --ignore=F824 --show-source --statistics

  # FASE 2: DESPLIEGUE CONTINUO (Construcción Docker y Entrega)
  despliegue-continuo:
    needs: integracion-continua # Crucial: El CD NO inicia si el CI (validación) falla
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Permiso para inyectar la imagen en GitHub Packages

    steps:
      - name: Descargar Código Fuente
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Autenticar en GitHub Packages (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # AQUÍ VA LA CREACIÓN DEL DOCKER 
      - name: Compilar Imagen Docker y Publicar en GitHub Packages
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          target: development 
          tags: ghcr.io/unsa-ips-grupoa5/inventree:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Confirmación de Despliegue en Servidor
        run: |
          echo "La imagen Docker válida ha sido creada y distribuida a GitHub Packages correctamente."
          echo "Para probarla localmente ejecuta:"
          echo "docker run -d --name inventree-test -p 8000:8000 ghcr.io/unsa-ips-grupoa5/inventree:latest"
